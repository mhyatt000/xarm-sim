[build-system]
requires = ["uv_build>=0.9.15"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "xsim"

[project]
name = "xarm-sim"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11, <3.13"
dependencies = [
    "av>=17.1.0",
    "genesis-world[render]>=1.2.0",
    "gs-nyx>=0.1.3",
    "gs-nyx-plugin>=0.1.2",
    "imageio>=2.37.3",
    "imageio-ffmpeg>=0.6.0",
    "opencv-python>=4.13.0.92",
    "tensordict>=0.13.0",
    "torch>=2.12.1",
    "tyro>=1.0.15",
]

[tool.uv]
environments = ["sys_platform == 'linux'"]
