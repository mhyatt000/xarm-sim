[build-system]
requires = ["uv_build>=0.9.15"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "xsim"

[tool.uv.sources]
webpolicy = { git = "https://github.com/mhyatt000/webpolicy" }
xarm-sim = { workspace = true, editable = true }

[tool.uv.workspace]
members = [
    ".",
]

[project]
name = "xarm-sim"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11, <3.13"
dependencies = [
    "av>=17.1.0",
    "foxglove-sdk>=0.25.1",
    "genesis-world[render]>=1.2.0",
    "gs-nyx>=0.1.3",
    "gs-nyx-plugin>=0.1.2",
    "gymnasium>=1.3.0",
    "imageio>=2.37.3",
    "imageio-ffmpeg>=0.6.0",
    "jax>=0.10.2",
    "protobuf>=7.35.1",
    "rich>=15.0.0",
    "tensordict>=0.13.0",
    "termcolor>=3.3.0",
    "torch>=2.12.1",
    "torchrl>=0.13.2",
    "tyro>=1.0.15",
    "viser>=0.2.23",
    "webpolicy",
    "zarr>=3.1.6",
]

[dependency-groups]
dev = [
    "xarm-sim",
]

[tool.uv]
environments = ["sys_platform == 'linux'"]
